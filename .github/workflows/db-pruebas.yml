name: DB Pruebas (aplicar SQL a Kamak-Pruebas)

# Aplica archivos .sql del repo a la base de PRUEBAS (Kamak-Pruebas) usando la
# Management API de Supabase con el SUPABASE_ACCESS_TOKEN ya cargado en secrets.
#
# ⚠️ SOLO PRUEBAS: el project ref está HARDCODEADO abajo (ecszfsrrkoyzpirzdxlp =
# Kamak-Pruebas). Este workflow NO puede tocar producción — la migración a prod
# tiene su propio workflow (db-migrate.yml) que corre al mergear a main.
#
# Uso A (sin tocar main): escribir la lista de .sql en supabase/pruebas-apply.txt
#   (una ruta por línea) y pushear una rama llamada db-pruebas/run/<lo-que-sea>.
#   El push dispara este workflow desde esa rama y aplica los archivos en orden.
# Uso B (cuando este archivo llegue a main): workflow_dispatch clásico:
#   gh workflow run db-pruebas.yml -r <rama> -f files="supabase/migrations/0006_campanas.sql"

on:
  push:
    branches: ['db-pruebas/run/**']
  workflow_dispatch:
    inputs:
      files:
        description: 'Archivos .sql a aplicar (separados por coma, en orden)'
        required: false
        type: string

concurrency:
  group: db-pruebas
  cancel-in-progress: false

jobs:
  aplicar:
    name: aplicar-sql-a-pruebas
    runs-on: ubuntu-latest
    env:
      # Kamak-Pruebas — NO CAMBIAR: es el candado que impide tocar prod.
      PRUEBAS_REF: ecszfsrrkoyzpirzdxlp
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar cada archivo via Management API
        shell: bash
        run: |
          set -euo pipefail
          # Lista de archivos: input del dispatch, o el manifiesto en pushes a db-pruebas/run/**
          RAW="${{ inputs.files }}"
          if [ -z "$RAW" ]; then
            if [ ! -f supabase/pruebas-apply.txt ]; then echo "::error::Sin input files ni supabase/pruebas-apply.txt"; exit 1; fi
            RAW="$(grep -v '^\s*#' supabase/pruebas-apply.txt | grep -v '^\s*$' | paste -sd, -)"
          fi
          IFS=',' read -ra FILES <<< "$RAW"
          for f in "${FILES[@]}"; do
            f="$(echo "$f" | xargs)"  # trim
            echo "── Aplicando: $f"
            if [ ! -f "$f" ]; then echo "::error::No existe $f"; exit 1; fi
            # El body es {"query": "<sql>"} — jq arma el JSON escapando el SQL.
            jq -Rs '{query: .}' < "$f" > /tmp/body.json
            code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/${PRUEBAS_REF}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @/tmp/body.json)
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::error::Fallo aplicando $f (HTTP $code)"; cat /tmp/resp.json; exit 1
            fi
            echo "   OK (HTTP $code)"
          done
          echo "✅ Todos los archivos aplicados a Kamak-Pruebas (${PRUEBAS_REF})"
